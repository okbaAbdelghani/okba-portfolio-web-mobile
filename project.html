<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Architecture Specifications</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-main: #0a0a12;
    --bg-surface: rgba(20, 20, 35, 0.65);
    --primary: #00ffc8;
    --text-primary: #f3f4f6;
    --text-secondary: #9ca3af;
    --card-border: rgba(255, 255, 255, 0.06);
    --font-stack: 'Plus Jakarta Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-stack); background: var(--bg-main); color: var(--text-primary);
    padding: 60px 8%; max-width: 1000px; margin: auto; line-height: 1.6;
  }

  .back-link {
    display: inline-flex; align-items: center; gap: 8px; color: var(--text-secondary);
    text-decoration: none; font-weight: 600; margin-bottom: 40px; transition: color 0.3s;
  }
  .back-link:hover { color: var(--primary); }

  h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 16px; color: #fff; }
  .desc-block { font-size: 1.15rem; color: var(--text-secondary); margin-bottom: 32px; text-align: left; }

  .tech-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 48px; }
  .tech-tags span {
    background: rgba(0, 255, 200, 0.06); color: var(--primary); border: 1px solid rgba(0, 255, 200, 0.15);
    border-radius: 8px; padding: 6px 14px; font-size: 0.85rem; font-weight: 600;
  }

  .media-header { font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; color: #fff; text-align: left; }

  /* ===== VIDEO PIPELINE ===== */
  .video-container {
    position: relative; width: 100%; padding-bottom: 56.25%; height: 0;
    margin-bottom: 32px; background: #141423; border-radius: 16px; overflow: hidden;
    border: 1px solid var(--card-border);
  }
  .video-container iframe { position: absolute; top:0; left:0; width:100%; height:100%; }

  .video-container.portrait {
    width: 280px; height: 500px; padding-bottom: 0; margin: 40px auto;
    border: 8px solid rgba(255,255,255,0.1); border-radius: 32px;
  }

  /* ===== IMAGE GALLERY SYSTEM ===== */
  .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 40px; }
  .gallery-grid img {
    width: 100%; height: 160px; object-fit: cover; border-radius: 12px; cursor: pointer;
    border: 1px solid var(--card-border); transition: all 0.3s ease; opacity: 0.85;
  }
  .gallery-grid img:hover { transform: scale(1.03); opacity: 1; border-color: var(--primary); }

  .show-more-btn {
    background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--card-border);
    padding: 12px 28px; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 0.9rem;
    transition: all 0.3s; margin: 20px auto; display: block;
  }
  .show-more-btn:hover { background: #fff; color: var(--bg-main); }

  /* ===== LIGHTBOX ENGINE ===== */
  #lightbox {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,5,10,0.98);
    display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden;
    transition: all 0.3s ease; z-index: 2000;
  }
  #lightbox.active { opacity: 1; visibility: visible; }
  #lightbox img { max-width: 85%; max-height: 75%; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
  .lightbox-close { position: absolute; top: 30px; right: 40px; font-size: 2.5rem; color: var(--text-secondary); cursor: pointer; }
  .lightbox-close:hover { color: #fff; }
  .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); font-size: 2.5rem; color: var(--text-secondary); cursor: pointer; user-select: none; padding: 20px; }
  .lightbox-nav:hover { color: var(--primary); }
  .lightbox-nav.prev { left: 40px; }
  .lightbox-nav.next { right: 40px; }

  .app-section { margin-top: 60px; border-top: 1px solid var(--card-border); padding-top: 40px; text-align: left;}
  .app-section h3 { font-size: 1.6rem; color: #fff; margin-bottom: 12px; }
  .app-section p { color: var(--text-secondary); margin-bottom: 24px; }
</style>
</head>
<body>

<header style="min-height: auto; padding:0; display:block; text-align:left;">
  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Return to Engine Matrix</a>
  <h1 id="title">System Specification</h1>
  <p id="desc" class="desc-block">Loading execution details...</p>
  <div id="tech" class="tech-tags"></div>
</header>

<main>
  <div id="singleAppContainer"></div>
  <div id="multiAppContainer"></div>
</main>

<div id="lightbox">
  <span class="lightbox-close">&times;</span>
  <span class="lightbox-nav prev">&#10094;</span>
  <img src="" alt="Active Matrix View" />
  <span class="lightbox-nav next">&#10095;</span>
</div>

<script src="./projects.js"></script>
<script>
  const projectId = localStorage.getItem("projectId");
  const project = window.projectsData?.find(p => p.id === projectId);

  if (!project) {
    document.getElementById("title").textContent = "⚠️ Entry Not Indexed";
    document.getElementById("desc").textContent = "The requested architectural artifact cannot be verified locally.";
  } else {
    document.getElementById("title").textContent = project.title;
    document.getElementById("desc").textContent = project.fullDescription;
    document.getElementById("tech").innerHTML = project.tech.map(t => `<span>${t}</span>`).join("");

    const lightbox = document.getElementById("lightbox");
    const lightboxImg = lightbox.querySelector("img");
    let currentIndex = 0;
    let currentGallery = [];

    function showLightbox() {
      lightboxImg.src = currentGallery[currentIndex];
      lightbox.classList.add("active");
    }
    function closeLightbox() { lightbox.classList.remove("active"); }
    function prevImage() { currentIndex = (currentIndex - 1 + currentGallery.length) % currentGallery.length; showLightbox(); }
    function nextImage() { currentIndex = (currentIndex + 1) % currentGallery.length; showLightbox(); }

    lightbox.querySelector(".lightbox-close").addEventListener("click", closeLightbox);
    lightbox.querySelector(".prev").addEventListener("click", prevImage);
    lightbox.querySelector(".next").addEventListener("click", nextImage);
    lightbox.addEventListener("click", e => { if (e.target === lightbox) closeLightbox(); });

    // Component Pipeline for Single Architectures
    const singleContainer = document.getElementById("singleAppContainer");
    if (project.type === "single-app") {
      if (project.videos && project.videos.length > 0) {
        singleContainer.insertAdjacentHTML('beforeend', '<h4 class="media-header">Video Demonstration</h4>');
        project.videos.forEach(url => {
          const div = document.createElement("div");
          div.className = url.includes("portrait") ? "video-container portrait" : "video-container";
          div.innerHTML = `<iframe src="${url}" frameborder="0" allowfullscreen></iframe>`;
          singleContainer.appendChild(div);
        });
      }

      if (project.images && project.images.length > 0) {
        singleContainer.insertAdjacentHTML('beforeend', '<h4 class="media-header">Interface Analytics</h4>');
        const gallery = document.createElement("div");
        gallery.className = "gallery-grid";
        const maxToShow = 4;

        project.images.forEach((src, idx) => {
          const img = document.createElement("img");
          img.src = src;
          img.addEventListener("click", () => {
            currentGallery = project.images;
            currentIndex = idx;
            showLightbox();
          });
          if (idx >= maxToShow) img.style.display = "none";
          gallery.appendChild(img);
        });

        if (project.images.length > maxToShow) {
          const toggleBtn = document.createElement("button");
          toggleBtn.textContent = "Show Complete Matrix";
          toggleBtn.className = "show-more-btn";
          toggleBtn.addEventListener("click", () => {
            const hiddenImgs = gallery.querySelectorAll("img:nth-child(n+" + (maxToShow + 1) + ")");
            const isExpanded = toggleBtn.textContent === "Collapse Matrix";
            hiddenImgs.forEach(img => img.style.display = isExpanded ? "none" : "inline-block");
            toggleBtn.textContent = isExpanded ? "Show Complete Matrix" : "Collapse Matrix";
          });
          singleContainer.appendChild(gallery);
          singleContainer.appendChild(toggleBtn);
        } else {
          singleContainer.appendChild(gallery);
        }
      }
    }

    // Component Pipeline for Multi-App Systems
    const multiContainer = document.getElementById("multiAppContainer");
    if (project.type === "multi-app" && project.apps) {
      project.apps.forEach(app => {
        const appSection = document.createElement("div");
        appSection.className = "app-section";
        appSection.innerHTML = `<h3>${app.name}</h3><p>${app.description}</p>`;

        if (app.videos && app.videos.length > 0) {
          app.videos.forEach(url => {
            const div = document.createElement("div");
            div.className = url.includes("portrait") ? "video-container portrait" : "video-container";
            div.innerHTML = `<iframe src="${url}" frameborder="0" allowfullscreen></iframe>`;
            appSection.appendChild(div);
          });
        }

        if (app.images && app.images.length > 0) {
          const gallery = document.createElement("div");
          gallery.className = "gallery-grid";
          const maxToShow = 4;

          app.images.forEach((src, idx) => {
            const img = document.createElement("img");
            img.src = src;
            img.addEventListener("click", () => {
              currentGallery = app.images;
              currentIndex = idx;
              showLightbox();
            });
            if (idx >= maxToShow) img.style.display = "none";
            gallery.appendChild(img);
          });

          appSection.appendChild(gallery);
          if (app.images.length > maxToShow) {
            const toggleBtn = document.createElement("button");
            toggleBtn.textContent = "Show Complete Matrix";
            toggleBtn.className = "show-more-btn";
            toggleBtn.addEventListener("click", () => {
              const hiddenImgs = gallery.querySelectorAll("img:nth-child(n+" + (maxToShow + 1) + ")");
              const isExpanded = toggleBtn.textContent === "Collapse Matrix";
              hiddenImgs.forEach(img => img.style.display = isExpanded ? "none" : "inline-block");
              toggleBtn.textContent = isExpanded ? "Show Complete Matrix" : "Collapse Matrix";
            });
            appSection.appendChild(toggleBtn);
          }
        }
        multiContainer.appendChild(appSection);
      });
    }
  }
</script>
</body>
</html>
